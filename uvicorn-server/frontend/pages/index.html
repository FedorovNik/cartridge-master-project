<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cartridge Master</title>
    <link rel="icon" type="image/x-icon" href="../static/favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Cartridge Master</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" onclick="showSection('section-list', this)">Список расходников</button>
                <button class="nav-btn" onclick="showSection('section-editor', this)">Редактор БД</button>
                <button class="nav-btn" onclick="showSection('section-users', this)">Пользователи</button>
                <button class="nav-btn" onclick="showSection('section-analysis', this)">Анализ расходов</button>
            </nav>
        </aside>

        <main class="main-content">
            
            <section id="section-list" class="content-section active-section">
                <div class="container">
                    <h1>Список расходников</h1>
                    <div class="search-container">
                        <input type="text" id="searchInput-1" oninput="filterTable_list()" placeholder="Фильтр поиска по названию" class="search-box">
                    </div>
                    <table id="inv-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Наименование</th>
                                <th>Текущее количество</th>
                                <th>Минимально необходимо</th>
                                
                                <th>Последнее изменение</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section id="section-editor" class="content-section">
                <div class="container">
                    <h1>Редактор базы</h1>
                    <div class="search-container">
                        <input type="text" id="searchInput-2" oninput="filterTable_edit()" placeholder="Фильтр поиска по названию" class="search-box">
                    </div>
                    <table id="editor-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Наименование</th>
                                <th>Текущее количество</th>
                                <th>Минимально необходимо</th>
                                <th>Действия</th>
                                <th>Список штрих-кодов</th>
                                <th>Последнее изменение</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section id="section-users" class="content-section">
                <div class="container">
                    <h1>Пользователи</h1>
                    <p>тест</p>
                </div>
            </section>

            <section id="section-analysis" class="content-section">
                <div class="container">
                    <h1>Анализ расходов</h1>
                    <p>тест</p>
                </div>
            </section>

        </main>
    </div>

    <!-- модули скриптоы для обмена  -->
    <script src="../js/render.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
