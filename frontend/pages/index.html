<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <h1>тест форма редактора бд</h1>
        <div class="search-container">
            <input 
                type="text" 
                id="searchInput" 
                oninput="filterTable()" 
                placeholder="Фильтр поиска по названию" 
                class="search-box"
            >
        </div>
        <table id="inv-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Наименование</th>
                    <th>Текущее количество</th>
                    <th>Минимально необходимо</th>
                    <th>Список штрих-кодов</th>
                    <th>Последнее изменение</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
